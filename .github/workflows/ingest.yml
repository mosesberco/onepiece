name: Ingest Latest Chapter

on:
  schedule:
    # ירוץ בכל יום ראשון ב-00:00 בלילה
    - cron: "0 0 * * 0"
  workflow_dispatch: 

permissions:
  contents: write 

concurrency:
  group: ingest-latest-chapter
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24" # שדרוג מ-20 ל-24 כדי להעלים את האזהרה

      - name: Install dependencies
        run: |
          npm install cheerio axios neo4j-driver

      - name: Scrape and ingest
        env:
          WIKI_URL: ${{ secrets.WIKI_URL }}
          INGESTION_URL: ${{ secrets.INGESTION_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # וודא שהגדרת את אלה ב-GitHub Secrets של ה-Repo:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: node scripts/scrape-latest-chapter.mjs

      - name: Commit state if changed
        run: |
          if [[ -f state.json && -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update ingestion state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi